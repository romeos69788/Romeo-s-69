board = BOARD_ESPRESSIF_ESP32_S3_LCD_EV_BOARD

[env:BOARD_ESPRESSIF_ESP32_S3_LCD_EV_BOARD_2]
build_flags =
    ${common.build_flags}
    ${rgb_mipi_lcd.build_flags}
    -DESP_PANEL_BOARD_DEFAULT_USE_SUPPORTED=1
    -DBOARD_ESPRESSIF_ESP32_S3_LCD_EV_BOARD_2
