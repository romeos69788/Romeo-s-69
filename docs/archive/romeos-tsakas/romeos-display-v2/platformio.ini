board = BOARD_ESPRESSIF_ESP32_P4_FUNCTION_EV_BOARD

; VIEWE boards:
; Αν «This chip is ESP32 not ESP32-S3»: το COM που διάλεξες είναι η μητρική (ESP32)· χρησιμοποίησε το COM της οθόνης Viewe (ESP32-S3).
; Αν «επιτυχές Upload» αλλά η οθόνη δεν αλλάζει: σχεδόν πάντα λάθος COM (ανέβηκε σε άλλο ESP, π.χ. μητρική)
; ή άνοιγμα λάθος project. Άνοιξε ΜΟΝΟ romeos-display-v2 (ή thermostat-ui-demo), Build+Upload.
[env:BOARD_VIEWE_UEDX80480070E_WB_A]
; IP μητρικής στο οικιακό LAN (ίδιο με motherboard-fw) όταν NVS home Wi‑Fi + STA σπίτι:
;   build_flags = ${common.build_flags} ... -DROMEOS_MB_LAN_IP=\"192.168.1.50\"
; Οθόνη Viewe (ESP32-S3). Η μητρική είναι άλλο project (motherboard-fw) — άλλο COM.
; ΜΗΝ κλειδώνεις COM εδώ: αν αλλάξεις USB θύρα (π.χ. Type‑C CDC αντί για UART), τα Windows δίνουν νέο COM
; και το monitor/upload «δεν βρίσκει το αρχείο COM4». Άφησε σχολιασμένα για αυτόματη επιλογή·
; ή ξε-σχολίασε και βάλε το σωστό COM από «Διαχείριση συσκευών» ή `pio device list`.
; Στο δικό σου PC: `pio device list` → βρες το COM της **Viewe** (USB-SERIAL CH340). Μετά ξε-σχολίασε και βάλε το ίδιο και σε upload και σε monitor — αλλιώς το Upload μπορεί να πάει σε άλλο ESP.
; Δεύτερη οθόνη μπορεί να είναι άλλο COM — βάλε το δικό σου από `pio device list`.
upload_port = COM3
monitor_port = COM3
; CH340: μερικές πλακέτες «σιωπηλό» monitor όταν το PIO αλλάζει DTR/RTS (EN/BOOT0). 0 = μην πειράζεις τις γραμμές κατά το άνοιγμα monitor — μετά πάτα EN στο board για boot log.
monitor_rts = 0
monitor_dtr = 0
; Μετά το flash: ρητό hardware reset του ESP (αν το CH340 έχει DTR→EN). Το backlight από εξωτερικό 5V δεν «σβήνει» — μόνο το chip επανεκκινείται· αλλιώς πάτησε EN.
upload_flags =
    --before=default_reset
    --after=hard_reset
build_flags =
    ${common.build_flags}
    ${rgb_mipi_lcd.build_flags}
    -DESP_PANEL_BOARD_DEFAULT_USE_SUPPORTED=1
    -DBOARD_VIEWE_UEDX80480070E_WB_A
    ; CH340: native USB **OFF** — με ARDUINO_USB_MODE=1 το Serial συχνά ΔΕΝ πάει στο CH340 (COM4 κενό).
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; SHT στο **ίδιο I2C με GT911** (GPIO19 SDA / GPIO20 SCL) — παράλληλα στα pads touch, 3V3, GND. Καθαρό Serial στο CH340 (COM4).
    ; Ανίχνευση **SHT4x (SHT40)** ή **SHT3x** στο ίδιο bus (το BOM είναι SHT40· ο παλιός κώδικας ήταν μόνο SHT3x → «?» στο ROOM).
    ; Εναλλακτικά (χωρίς αλλαγή καλωδίων): 43/44 + garbage στο COM4 — `-DROMEOS_ROOM_I2C_SDA=43` `-DROMEOS_ROOM_I2C_SCL=44`
    ; ΠΟΤΕ 18/38 = GT911 INT/RST. SD pins 10–13 όχι για SHT.
    -DROMEOS_ROOM_I2C_SDA=19
    -DROMEOS_ROOM_I2C_SCL=20
    ; v2: χωρίς UDP/WiFi προς παλιά μητρική — όταν φτιαχτεί νέα μητρική, αφαίρεσε το flag και ενεργοποίησε link.
    -DROMEOS_DISPLAY_STANDALONE=0
    ; Όχι LAN IP παλιάς μητρικής (default κενό στο shared header). Για νέα μητρική: -DROMEOS_MB_LAN_IP=\"x.x.x.x\"
    -DROMEOS_ROOM_USE_MB_FALLBACK=0
    ; SHT vs πραγματικό χώρο (δέκατα °C): −30 = −3,0 °C — άλλαξε/αφαίρεσε αν δεν ταιριάζει με αναφορά.
    -DROMEOS_ROOM_TEMP_CORR_X10=-30
    ; Διάγνωση SHT στο Serial (~2 s): raw / RH / φίλτρο / ένδειξη (αφαίρεσε μετά το τεστ)
    -DROMEOS_ROOM_SENSOR_DEBUG
    ; Χωρίς I2C αισθητήρα στην οθόνη: 0 = πάντα «?» στη γωνία ROOM· 1 (default) = δείξε room_display από μητρική όταν η UDP τηλεμετρία δεν είναι demo.
    ; -DROMEOS_ROOM_USE_MB_FALLBACK=0
board = BOARD_VIEWE_UEDX80480070E_WB_A
