; ===========================================================================
; romeos-display-v2 — δεύτερη οθόνη (ίδιο Viewe hardware). Χωρίς σύνδεση στην παλιά μητρική.
; Το παλιό UI/firmware μένει στο thermostat-ui-demo (π.χ. για φίλο / λέβητα πετρελαίου).
; ===========================================================================
; Windows: αν κατά την εγκατάσταση εμφανιστεί FileNotFoundError στο unzip του
; esp32-*-libs (μακριά nested διαδρομή), ενεργοποίησε Long Paths και ξαναδοκίμασε:
;
; 1) PowerShell ως Διαχειριστής:
;    New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
;      -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
;    (επανεκκίνηση PC)
; 2) Διέγραψε το cache: %USERPROFILE%\.platformio\.cache
; 3) Build ξανά από PlatformIO
;
; Προαιρετικά: μείωσε μήκος βάσης με μεταβλητή περιβάλλοντος (νέο τερματικό μετά):
;    setx PLATFORMIO_CORE_DIR "C:\.pio"
; ---------------------------------------------------------------------------
[platformio]
; Ενεργό board — άλλαξε σε άλλο όνομα env αν χρησιμοποιείς άλλη πλακέτα (λίστα παρακάτω).
default_envs = BOARD_VIEWE_UEDX80480070E_WB_A
; Άλλα διαθέσιμα env: BOARD_CUSTOM, BOARD_ESPRESSIF_ESP32_C3_LCDKIT,
; BOARD_ESPRESSIF_ESP32_S3_BOX, BOARD_ESPRESSIF_ESP32_S3_BOX_3, BOARD_ESPRESSIF_ESP32_S3_EYE,
; BOARD_ESPRESSIF_ESP32_S3_KORVO_2, BOARD_ESPRESSIF_ESP32_S3_LCD_EV_BOARD,
; BOARD_ESPRESSIF_ESP32_S3_LCD_EV_BOARD_2, BOARD_ESPRESSIF_ESP32_S3_LCD_EV_BOARD_V1_5,
; BOARD_ESPRESSIF_ESP32_S3_LCD_EV_BOARD_2_V1_5, BOARD_ESPRESSIF_ESP32_S3_USB_OTG,
; BOARD_ESPRESSIF_ESP32_P4_FUNCTION_EV_BOARD

;
; Here are the global configurations used for all board envs
;
[env]
; Serial monitor: 115200 baud. Viewe: SHT στο I2C touch 19/20 → COM4 (CH340 / UART0) μένει καθαρό· buzzer GPIO17.
; build_src_filter σχετίζεται με src/ → ../../shared/ για sibling φάκελο repo.
build_src_filter = +<*> -<main.cpp> +<../../shared/src/romeos_wifi_nvs.cpp> +<squareline/images/ui_img_thermostat_ab_png.c> +<squareline/images/ui_img_hot_png.c> +<squareline/images/ui_img_col_png.c> +<squareline/images/ui_img_chatgpt1_32x32_png.c> +<squareline/images/ui_img_day_p0.c> +<squareline/images/ui_img_day_p1.c> +<squareline/images/ui_img_day_p2.c> +<squareline/images/ui_img_day_p3.c> +<squareline/images/ui_img_day_p4.c>
framework = arduino
; The `espressif32` latest official version does not support Arduino v3.1.x, temporarily using a third-party version
; platform = espressif32
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
platform_packages =
    ; ZIP αντί για git — αποφεύγει «Please install Git client» αν δεν έχεις Git στο PATH
    platformio/framework-arduinoespressif32@https://github.com/espressif/arduino-esp32/archive/refs/tags/3.1.1.zip
    ; framework-arduinoespressif32-libs: default από platform (πλήρες)· το προηγούμενο override
    ; dl.espressif.com/.../esp32-3.1.1-h.zip εγκατέστησε ελλιπές trees (χωρίς esp32s3/pioarduino-build.py) → build S3 FAILED.
    ; Αν ξαναχρειαστεί «h» libs για RGB drift, έλεγξε ότι το zip περιέχει esp32s3/ πριν το ενεργοποιήσεις.
; Windows: pioarduino's esptool zip can fail in postinstall (WinError 2). Force official PlatformIO uploader:
    platformio/tool-esptoolpy@~1.40501.0
monitor_speed = 115200
lib_deps =
; For production:
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git#v1.1.0
    https://github.com/esp-arduino-libs/esp-lib-utils.git#v0.2.0
    https://github.com/lvgl/lvgl.git#v8.4.0
    adafruit/Adafruit SHT31 Library @ ^2.2.2
; For local development:
    ; file://../../../../ESP32_Display_Panel
    ; file://../../../../ESP32_IO_Expander
    ; file://../../../../esp-lib-utils
    ; file://../../../../lvgl

;
; Here are the options that can be used in the board envs
;
[common]
build_flags =
; Arduino related:
    -DCORE_DEBUG_LEVEL=1    ; Set to `5` for full debug output, `0` for none
; LVGL related:
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
; Include path (board_override first: shadow ESP32_Display_Panel viewe/*.h for RGB timing tweaks)
    -I src/board_override
    -I src
    -I src/squareline
    -I ../shared/include
; Others:
    ; -DDISABLE_ALL_LIBRARY_WARNINGS    ; Disable all library warnings

[spi_qspi_lcd]
build_flags =
; LVGL related:
    -DLV_COLOR_16_SWAP=1

[rgb_mipi_lcd]
build_flags =
; LVGL related:
    -DLV_COLOR_16_SWAP=0

;
; Here are the available board envs
;
[env:BOARD_CUSTOM]
build_flags =
    ${common.build_flags}
; Add custom build flags here:
    ; ${rgb_mipi_lcd.build_flags}
    ; ${spi_qspi_lcd.build_flags}
board = BOARD_CUSTOM

; Espressif boards:
[env:BOARD_ESPRESSIF_ESP32_C3_LCDKIT]
build_flags =
    ${common.build_flags}
    ${spi_qspi_lcd.build_flags}
    -DESP_PANEL_BOARD_DEFAULT_USE_SUPPORTED=1
    -DBOARD_ESPRESSIF_ESP32_C3_LCDKIT
board = BOARD_ESPRESSIF_ESP32_C3_LCDKIT

[env:BOARD_ESPRESSIF_ESP32_S3_BOX]
build_flags =
    ${common.build_flags}
    ${spi_qspi_lcd.build_flags}
    -DESP_PANEL_BOARD_DEFAULT_USE_SUPPORTED=1
    -DBOARD_ESPRESSIF_ESP32_S3_BOX
board = BOARD_ESPRESSIF_ESP32_S3_BOX

