; romeos-display-v4 — Viewe + SquareLine export «WITE THERMOSTAT» (Screen1…6).
; Καθαρό firmware: μόνο board + LVGL + ui_init. Λογική (NTP, MB, αισθητήρες) ξεχωριστά αργότερα.
; Οθόνη: COM3 (ανοίγεις μόνο αυτό το project για upload).
;
[platformio]
default_envs = BOARD_VIEWE_UEDX80480070E_WB_A
; Δοκιμή EEZ central_screen: pio run -e BOARD_VIEWE_EEZ_CENTRAL -t upload

[env]
build_src_filter =
    +<*>
    -<main.cpp>
    +<main_v4.cpp>
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
platform_packages =
    platformio/framework-arduinoespressif32@https://github.com/espressif/arduino-esp32/archive/refs/tags/3.1.1.zip
    platformio/tool-esptoolpy@~1.40501.0
monitor_speed = 115200
lib_deps =
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git#v1.1.0
    https://github.com/esp-arduino-libs/esp-lib-utils.git#v0.2.0
    https://github.com/lvgl/lvgl.git#v8.4.0

[common]
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I src/board_override
    -I src
    -I src/squareline
    -I ../shared/include

; 32-bit LVGL: LV_COLOR_16_SWAP must stay 0 (see lv_color.h). RGB panel flush still converts to panel format in port.
; Alarm buzzer: ίδιο με v2/v3 — GPIO17, STYLE=1 (digital HIGH=ON). Backlight οθόνης = GPIO2, όχι 17.
; Προαιρετικά: STYLE=2 (LEDC) + ROMEOS_V4_BUZZER_LEDC_HZ για passive piezo.
[rgb_mipi_lcd]
build_flags =
    -DLV_COLOR_16_SWAP=0
    -DROMEOS_V4_BUZZER_GPIO=17
    -DROMEOS_V4_BUZZER_STYLE=1
    -DROMEOS_V4_BUZZER_ACTIVE_HIGH=1
    -DROMEOS_V4_BUZZER_LEDC_HZ=4000

[env:BOARD_VIEWE_UEDX80480070E_WB_A]
; Default dual-OTA 16 MB table caps κάθε app στα ~6 MB — το export v4 ξεπερνά αυτό το όριο.
board_build.partitions = ROMEOS_V4_16MB_SINGLEAPP.csv
upload_port = COM3
monitor_port = COM3
monitor_rts = 0
monitor_dtr = 0
upload_flags =
    --before=default_reset
    --after=hard_reset
build_flags =
    ${common.build_flags}
    ${rgb_mipi_lcd.build_flags}
    -DESP_PANEL_BOARD_DEFAULT_USE_SUPPORTED=1
    -DBOARD_VIEWE_UEDX80480070E_WB_A
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DROMEOS_DISPLAY_STANDALONE=0
board = BOARD_VIEWE_UEDX80480070E_WB_A

; EEZ Studio «central_screen» — UI + Wi‑Fi σπιτιού, NTP, αισθητήρας, alarm.
[env:BOARD_VIEWE_EEZ_CENTRAL]
extends = env:BOARD_VIEWE_UEDX80480070E_WB_A
build_src_filter =
    +<*>
    -<main_v4.cpp>
    -<main.cpp>
    -<romeos_*.cpp>
    +<romeos_setpoint_ui.cpp>
    +<romeos_eez_runtime.cpp>
    +<romeos_ntp.cpp>
    +<romeos_wifi_nvs.cpp>
    +<romeos_display_link.cpp>
    +<romeos_room_sht_touch_bus.cpp>
    -<squareline>
    +<main_eez_central.cpp>
build_flags =
    -I src/eez_central
    ${env:BOARD_VIEWE_UEDX80480070E_WB_A.build_flags}
    ${common.build_flags}
    -DEEZ_FOR_LVGL=1
    -DLV_FONT_FMT_TXT_LARGE=1
