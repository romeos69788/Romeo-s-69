; Firmware μητρικής (CONTROL BOARD) — ESP32 DevKit 38 pin
; Χάρτης pin: thermostat-ui-demo/docs/romeos-design-notes.md §12.2.2 / §12.19.16
;
; Αν το upload δίνει «This chip is ESP32-S3, not ESP32»:
;   Το COM που χρησιμοποιείς είναι σχεδόν σίγουρα η οθόνη (S3). Αυτό το project φλασάρει ESP32 μητρικής.
;   Χρησιμοποίησε το USB/UART της μητρικής για motherboard-fw, και ξεχωριστά το project thermostat-ui-demo για την οθόνη.
;
[platformio]
default_envs = esp32_motherboard

[env:esp32_motherboard]
; Ίδιο stack με thermostat-ui-demo (pioarduino + arduino-esp32 zip) — αποφεύγει ελλιπές framework / SPI.h.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
platform_packages =
    platformio/framework-arduinoespressif32@https://github.com/espressif/arduino-esp32/archive/refs/tags/3.1.1.zip
    platformio/tool-esptoolpy@~1.40501.0
board = esp32dev
framework = arduino
; NVS Wi‑Fi: src/romeos_wifi_nvs.cpp → #include ../../shared/src/romeos_wifi_nvs.cpp (όχι εξωτερικό .cpp στο filter).
build_src_filter = +<*>
monitor_speed = 115200
; Αν στο IDE «δεν γράφει» στο Serial: PowerShell:
;   cd "d:\Romeos Tsakas\motherboard-fw"
;   & "$env:USERPROFILE\.platformio\penv\Scripts\platformio.exe" device monitor -p COM7 -b 115200 --echo
; ή PuTTY: Serial, COM7, 115200.
; Local echo ώστε να βλέπεις τι πληκτρολογείς (δεν αλλάζει τη σύνδεση στη θύρα).
monitor_echo = yes
; CP210x στο Device Manager = COM7 (μητρική / standby). CH340 COM4 = συνήθως οθόνη (thermostat-ui-demo).
; Αν «port is busy»: κλείσε Serial Monitor πριν το upload.
upload_port = COM7
monitor_port = COM7
upload_flags =
    --before=default_reset
    --after=hard_reset

; Όταν breadboard αισθητήρες OK, πρόσθεσε στο build_flags: -DROMEOS_MB_TELEMETRY_OK
; CT στο PCB (GPIO35): -DROMEOS_MB_HAVE_CT_ADC=1 — προεπιλογή 0 (χωρίς CT / ορφανό net OK).
; Οθόνη (ίδιο flag στο thermostat-ui-demo): IP μητρικής στο LAN όταν και τα δύο STA στο σπίτι:
;   -DROMEOS_MB_LAN_IP=\"192.168.1.50\"
;
; MQTT (ESP32): TLS πόρτα 8883 — ΜΟΝΟ hostname (όχι wss://). Οι 3 γραμμές -DROMEOS_MQTT_* πρέπει να είναι ΜΕΣΑ στο build_flags.
; Αντικατέστησε το REPLACE_MQTT_PASS με τον κωδικό HiveMQ (μην κάνεις commit πραγματικό κωδικό στο git).
; Προαιρετικό Wi‑Fi στο NVS χωρίς Serial: ROMEOS_HOME_SSID / ROMEOS_HOME_PASS.
; Αν το NVS έχει παλιά λάθος SSID, στο επόμενο flash τα αντικαθιστά αυτόματα αν δεν ταιριάζουν με τα build flags.
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DROMEOS_MB_BENCH_RELAYS_ON=1
    -I include
    -I ../shared/include
    -DROMEOS_MQTT_HOST=\"1f20d31217e1431a8723a096120ecd00.s1.eu.hivemq.cloud\"
    -DROMEOS_MQTT_USER=\"romeos69\"
    -DROMEOS_MQTT_PASS=\"Rts170214rts@\"
    -DROMEOS_HOME_SSID=\"MERCUSYS_Romeos\"
    -DROMEOS_HOME_PASS=\"romeos123456789\"

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.5
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    adafruit/DHT sensor library @ ^1.4.6
    ; DS18B20 (1-Wire) — προαιρετικό, ενεργοποίησε όταν μπει στον κώδικα
    ; paulstoffregen/OneWire @ ^2.3.8
    ; milesburton/DallasTemperature @ ^3.11.0
