; romeos-display-v5 — Viewe 7″ + EEZ «othoni_7» (800×480).
; Default: othoni_7 UI + Wi‑Fi, NTP, setpoint, alarm, MENU/MIC, secondary screen.
; Οθόνη Viewe = ESP32-S3. COM7 στο PC τώρα = ESP32 (όχι S3) — βλέπε README.
; Upload: σύνδεσε USB της οθόνης S3 (συχνά CH340, όχι CP210x μητρικής).
;
[platformio]
default_envs = BOARD_VIEWE_OTHONI_7
; Τοπικό Wi‑Fi σπιτιού (αν υπάρχει secrets/wifi_home.ini) — γράφεται στο NVS στο πρώτο boot.
extra_configs = secrets/wifi_home.ini

[env]
build_src_filter =
    +<*>
    -<main.cpp>
    -<main_eez_central.cpp>
    -<romeos_eez_runtime.cpp>
    -<othoni_ui>
    -<eez_central>
    +<main_v4.cpp>
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
platform_packages =
    platformio/framework-arduinoespressif32@https://github.com/espressif/arduino-esp32/archive/refs/tags/3.1.1.zip
    platformio/tool-esptoolpy@~1.40501.0
monitor_speed = 115200
lib_deps =
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git#v1.1.0
    https://github.com/esp-arduino-libs/esp-lib-utils.git#v0.2.0
    https://github.com/lvgl/lvgl.git#v8.4.0

[common]
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I src/board_override
    -I src
    -I src/squareline
    -I ../shared/include

[rgb_mipi_lcd]
build_flags =
    -DLV_COLOR_16_SWAP=0
    -DROMEOS_V4_BUZZER_GPIO=17
    -DROMEOS_V4_BUZZER_STYLE=1
    -DROMEOS_V4_BUZZER_ACTIVE_HIGH=1
    -DROMEOS_V4_BUZZER_LEDC_HZ=4000

[env:BOARD_VIEWE_UEDX80480070E_WB_A]
board_build.partitions = ROMEOS_V4_16MB_SINGLEAPP.csv
upload_port = COM3
monitor_port = COM3
monitor_rts = 0
monitor_dtr = 0
upload_flags =
    --before=default_reset
    --after=hard_reset
build_flags =
    ${common.build_flags}
    ${rgb_mipi_lcd.build_flags}
    -DESP_PANEL_BOARD_DEFAULT_USE_SUPPORTED=1
    -DBOARD_VIEWE_UEDX80480070E_WB_A
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DROMEOS_DISPLAY_STANDALONE=0
board = BOARD_VIEWE_UEDX80480070E_WB_A

; EEZ othoni_7 — νέο design + secondary_a + MIC
[env:BOARD_VIEWE_OTHONI_7]
extends = env:BOARD_VIEWE_UEDX80480070E_WB_A
extra_scripts = pre:scripts/wifi_home_build_flags.py
build_src_filter =
    +<*>
    -<main_v4.cpp>
    -<main.cpp>
    -<romeos_v4_*.cpp>
    -<romeos_setpoint_ui.cpp>
    -<squareline>
    -<eez_central>
    +<romeos_eez_runtime.cpp>
    +<romeos_ntp.cpp>
    +<romeos_wifi_nvs.cpp>
    +<romeos_display_link.cpp>
    +<romeos_room_sht_touch_bus.cpp>
    -<romeos_mb_uart_link.cpp>
    +<othoni_ui/*>
    +<main_eez_central.cpp>
build_flags =
    -I src/othoni_ui
    ${env:BOARD_VIEWE_UEDX80480070E_WB_A.build_flags}
    ${common.build_flags}
    -DEEZ_FOR_LVGL=1
    -DLV_FONT_FMT_TXT_LARGE=1
    -DROMEOS_DISPLAY_V5=1
    -DROMEOS_WIFI_HOME_ONLY=1
    ; RGB anti-tear: mode 3 (direct, προεπιλογή lvgl_v8_port). Μην βάζεις mode 1 εδώ — προκαλεί flicker.

; Προεπισκόπηση background images (άλμπουμ) — δεν αντικαθιστά το othoni_7 UI.
[env:BOARD_VIEWE_BG_PREVIEW]
extends = env:BOARD_VIEWE_UEDX80480070E_WB_A
extra_scripts = pre:scripts/build_preview_album.py
build_src_filter =
    +<*>
    -<main_v4.cpp>
    -<main.cpp>
    -<main_eez_central.cpp>
    -<romeos_eez_runtime.cpp>
    -<romeos_ntp.cpp>
    -<romeos_wifi_nvs.cpp>
    -<romeos_display_link.cpp>
    -<romeos_room_sht_touch_bus.cpp>
    -<romeos_mb_uart_link.cpp>
    -<romeos_v4_*.cpp>
    -<romeos_setpoint_ui.cpp>
    -<squareline>
    -<eez_central>
    -<othoni_ui>
    +<main_bg_preview.cpp>
    +<preview_album/generated/preview_0*.c>
    +<preview_album/generated/preview_1*.c>
    +<preview_album/generated/preview_album_data.c>
build_flags =
    ${env:BOARD_VIEWE_UEDX80480070E_WB_A.build_flags}
    ${common.build_flags}
    -I src/preview_album/generated
