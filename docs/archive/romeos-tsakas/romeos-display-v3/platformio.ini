; romeos-display-v3 — Viewe οθόνη (SquareLine THERMOSTAT_3, 16-bit LVGL).
; Οθόνη Viewe (ESP32-S3): COM3 · Μητρική: COM7 (άλλο project / άλλο firmware).
; Αν μετά το flash βλέπεις ακόμα "CLEAN-V2" στην οθόνη, το upload ΔΕΝ πήγε στο ESP της οθόνης
; (λάθος COM, ή άλλο project ανοιχτό). Ξεκίνα με: pio device list
; Μετά ρητά: pio run -t upload --upload-port COM3
; (Προαιρετικά ξεκόλλα USB της μητρικής ώστε να μείνει μόνο το CH340 της οθόνης.)
;
[platformio]
default_envs = BOARD_VIEWE_UEDX80480070E_WB_A

[env]
build_src_filter =
    +<*>
    -<main.cpp>
    +<main_v3.cpp>
    +<../../shared/src/romeos_wifi_nvs.cpp>
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
platform_packages =
    platformio/framework-arduinoespressif32@https://github.com/espressif/arduino-esp32/archive/refs/tags/3.1.1.zip
    platformio/tool-esptoolpy@~1.40501.0
monitor_speed = 115200
lib_deps =
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git#v1.1.0
    https://github.com/esp-arduino-libs/esp-lib-utils.git#v0.2.0
    https://github.com/lvgl/lvgl.git#v8.4.0
    adafruit/Adafruit SHT31 Library @ ^2.2.2

[common]
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I src/board_override
    -I src
    -I src/squareline
    -I ../shared/include

[rgb_mipi_lcd]
build_flags =
    -DLV_COLOR_16_SWAP=0

[env:BOARD_VIEWE_UEDX80480070E_WB_A]
upload_port = COM3
monitor_port = COM3
monitor_rts = 0
monitor_dtr = 0
upload_flags =
    --before=default_reset
    --after=hard_reset
build_flags =
    ${common.build_flags}
    ${rgb_mipi_lcd.build_flags}
    -DESP_PANEL_BOARD_DEFAULT_USE_SUPPORTED=1
    -DBOARD_VIEWE_UEDX80480070E_WB_A
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DROMEOS_ROOM_I2C_SDA=19
    -DROMEOS_ROOM_I2C_SCL=20
    -DROMEOS_DISPLAY_STANDALONE=0
    -DROMEOS_ROOM_USE_MB_FALLBACK=0
    -DROMEOS_ROOM_TEMP_CORR_X10=-30
board = BOARD_VIEWE_UEDX80480070E_WB_A
