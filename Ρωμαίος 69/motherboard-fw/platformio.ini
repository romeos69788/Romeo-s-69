; ROMEOS 69 — Alpha rev A (μητρική καυστήρα)
; Σύνδεση με romeos-remote μέσω HiveMQ Cloud (MQTT over TLS).

[env:alpha_rev_a]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.0
build_flags =
    -DROMEOS_MQTT_DEVICE_ID=\"romeos-mb\"
    -DROMEOS_FW_VERSION=1
    ; Πρόσθεσε τα δικά σου στοιχεία broker (μην κάνεις commit secrets):
    ; -DROMEOS_MQTT_HOST=\"xxxx.s1.eu.hivemq.cloud\"
    ; -DROMEOS_MQTT_USER=\"...\"
    ; -DROMEOS_MQTT_PASS=\"...\"
    ; -DROMEOS_MQTT_PORT=8883

; Bench / CI compile χωρίς broker credentials
[env:alpha_rev_a_bench]
extends = env:alpha_rev_a
build_flags =
    ${env:alpha_rev_a.build_flags}
    -DROMEOS_BENCH=1
