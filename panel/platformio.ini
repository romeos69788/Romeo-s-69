; ROMEOS 69 — Panel Alpha hub V4 LOCKED (Viewe 7″ · EEZ Othoni_Levita_4)
; Visual hub locked 2026-07-23. Wi‑Fi/NTP from ../secrets/wifi.env (gitignored).

[platformio]
default_envs = BOARD_VIEWE_PANEL
src_dir = src

[env:BOARD_VIEWE_PANEL]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
platform_packages =
    platformio/framework-arduinoespressif32@https://github.com/espressif/arduino-esp32/archive/refs/tags/3.1.1.zip
    platformio/tool-esptoolpy@~1.40501.0
framework = arduino
board = BOARD_VIEWE_UEDX80480070E_WB_A
board_build.partitions = ROMEOS_V4_16MB_SINGLEAPP.csv
upload_port = COM4
upload_speed = 921600
monitor_port = COM4
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
extra_scripts = pre:scripts/inject_wifi_flags.py
lib_deps =
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git#v1.1.0
    https://github.com/esp-arduino-libs/esp-lib-utils.git#v0.2.0
    https://github.com/lvgl/lvgl.git#v8.4.0
build_src_filter =
    +<*>
    +<ui/*>
    -<ui/ui_image_1.c>
    -<ui/ui_image_2.c>
    -<ui/ui_image_3.c>
    -<ui/ui_image_4.c>
    -<ui/ui_image_5.c>
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DLV_COLOR_16_SWAP=0
    -DEEZ_FOR_LVGL=1
    -DLV_FONT_FMT_TXT_LARGE=1
    -DESP_PANEL_BOARD_DEFAULT_USE_SUPPORTED=1
    -DBOARD_VIEWE_UEDX80480070E_WB_A
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DROMEOS_PANEL_HUB_V4_LOCKED=1
    -I$PROJECT_LIBDEPS_DIR/$PIOENV
    -I src/board_override
    -I src
    -I src/ui
    -I include
